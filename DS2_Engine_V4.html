<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DS2 SotFS — 100% Engine + Dark Hexer Build</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap');

:root {
  --bg: #0e0d0b; --bg2: #161310; --bg3: #1e1a16; --card: #201c18;
  --gold: #c8a030; --ember: #d4652a; --green: #4ade80; --purple: #8b5cf6;
  --lt: #e8dcc8; --dim: #6b6050; --border: #2a2420;
  --p1: #6b7c52; --p2: #7a8c62; --p3: #c8a030; --p4: #d4862a; --p5: #c45a30; --p6: #a03030;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--lt); font-family:'EB Garamond',Georgia,serif; font-size:14px; line-height:1.4; min-height:100vh; }
::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-track { background:var(--bg2); } ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

.app { max-width:480px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; }
.header { padding:12px 16px 8px; text-align:center; border-bottom:1px solid var(--border); }
.header h1 { font-family:'Cinzel',serif; font-size:15px; color:var(--gold); letter-spacing:2px; }
.header .sub { font-size:11px; color:var(--dim); margin-top:2px; }

/* Tabs */
.tabs { display:flex; border-bottom:1px solid var(--border); background:var(--bg2); }
.tab { flex:1; padding:10px 4px; text-align:center; font-family:'Cinzel',serif; font-size:10px; letter-spacing:0.5px;
  color:var(--dim); cursor:pointer; border-bottom:2px solid transparent; transition:all 0.2s; }
.tab:hover { color:var(--lt); }
.tab.active { color:var(--gold); border-bottom-color:var(--gold); }

/* Content */
.content { flex:1; overflow-y:auto; padding-bottom:20px; }
.section-title { font-family:'Cinzel',serif; font-size:16px; color:var(--gold); padding:16px 16px 8px; letter-spacing:1px; }
.section-sub { font-size:11px; color:var(--dim); padding:0 16px 12px; }

/* Progress bar */
.pbar { background:var(--border); border-radius:3px; height:6px; overflow:hidden; flex:1; }
.pbar .fill { height:100%; border-radius:3px; transition:width 0.4s; }

/* Cards & Items */
.area-card { margin:4px 12px; padding:10px 12px; background:var(--card); border-radius:6px; cursor:pointer; display:flex; align-items:center; gap:10px; border:1px solid var(--border); }
.area-card:hover { border-color:var(--gold); }
.area-card .name { flex:1; font-size:12px; color:var(--lt); }
.area-card .pct { font-size:11px; color:var(--dim); min-width:36px; text-align:right; }

.item-row { display:flex; align-items:flex-start; gap:8px; padding:8px 12px; margin:3px 12px; border-radius:5px;
  cursor:pointer; border:1px solid var(--border); background:var(--bg2); transition:all 0.15s; }
.item-row:hover { border-color:#3a342a; }
.item-row.done { opacity:0.45; border-color:var(--green); background:rgba(74,222,128,0.03); }
.item-row .check { width:18px; height:18px; border:2px solid var(--border); border-radius:3px; flex-shrink:0; display:flex; align-items:center; justify-content:center; margin-top:1px; }
.item-row.done .check { border-color:var(--green); background:rgba(74,222,128,0.15); color:var(--green); font-size:12px; }
.item-row .text { flex:1; font-size:12px; }

.type-boss { color:var(--ember); } .type-key { color:var(--gold); } .type-npc { color:var(--purple); }
.type-bonfire { color:#e85830; } .type-item { color:var(--dim); } .type-warn { color:#ef4444; font-weight:600; }

/* Quest section */
.quest-card { margin:6px 12px; padding:10px 12px; background:var(--card); border-radius:6px; border:1px solid var(--border); }
.quest-name { font-family:'Cinzel',serif; font-size:13px; color:var(--gold); margin-bottom:6px; }
.quest-step { display:flex; align-items:flex-start; gap:8px; padding:5px 0; cursor:pointer; }
.quest-step.done { opacity:0.4; }
.boss-tag { display:inline-block; background:rgba(212,101,42,0.15); color:var(--ember); padding:2px 8px; border-radius:3px; font-size:10px; margin:2px 0; }

/* Tracker grid */
.tracker-grid { display:grid; grid-template-columns:1fr 1fr; gap:4px; padding:0 12px; }
.tracker-item { display:flex; align-items:center; gap:6px; padding:5px 8px; border-radius:3px; cursor:pointer; font-size:11px; }
.tracker-item.done { opacity:0.4; }

/* ═══ BUILD TAB ═══ */
.build-header { padding:16px; text-align:center; border-bottom:1px solid var(--border); }
.build-header h2 { font-family:'Cinzel',serif; font-size:18px; color:var(--gold); letter-spacing:2px; }
.build-header .philosophy { font-size:12px; color:var(--dim); margin-top:4px; max-width:400px; margin-left:auto; margin-right:auto; }

.stat-bar { display:flex; gap:2px; padding:8px 12px; background:var(--bg2); border-bottom:1px solid var(--border); flex-wrap:wrap; justify-content:center; }
.stat-chip { font-size:10px; padding:3px 6px; border-radius:3px; background:var(--card); border:1px solid var(--border); color:var(--dim); font-family:'Cinzel',serif; }
.stat-chip .val { color:var(--gold); font-weight:700; }
.stat-chip.done { border-color:var(--green); }
.stat-chip.done .val { color:var(--green); }

/* Phase nav */
.phase-nav { display:flex; gap:0; border-bottom:1px solid var(--border); }
.phase-btn { flex:1; padding:8px 4px; text-align:center; font-size:9px; font-family:'Cinzel',serif; cursor:pointer; border-bottom:2px solid transparent; color:var(--dim); transition:all 0.15s; }
.phase-btn:hover { color:var(--lt); }
.phase-btn.active { border-bottom-color:var(--gold); color:var(--gold); }

/* Level rows */
.level-grid { padding:4px 8px; }
.phase-header { padding:10px 12px 6px; display:flex; align-items:center; gap:8px; }
.phase-header .dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.phase-header .label { font-family:'Cinzel',serif; font-size:12px; color:var(--gold); }
.phase-header .range { font-size:10px; color:var(--dim); margin-left:auto; }
.phase-header .areas { font-size:10px; color:var(--dim); }

.lvl-row { display:flex; align-items:center; gap:0; padding:0; margin:1px 4px; border-radius:3px; cursor:pointer;
  background:var(--bg2); border:1px solid transparent; transition:all 0.1s; font-size:11px; height:26px; }
.lvl-row:hover { border-color:#3a342a; }
.lvl-row.done { opacity:0.35; }
.lvl-row .sl { width:38px; text-align:center; font-family:'Cinzel',serif; font-size:10px; color:var(--dim); flex-shrink:0; }
.lvl-row .phase-dot { width:4px; height:18px; border-radius:2px; flex-shrink:0; margin-right:6px; }
.lvl-row .stat-name { width:32px; font-family:'Cinzel',serif; font-size:10px; font-weight:700; flex-shrink:0; }
.lvl-row .arrow { color:var(--dim); font-size:10px; margin:0 3px; flex-shrink:0; }
.lvl-row .new-val { width:22px; font-size:11px; font-weight:600; flex-shrink:0; }
.lvl-row .note { flex:1; font-size:9.5px; color:var(--dim); font-style:italic; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; padding-right:6px; }
.lvl-row .chk { width:22px; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:10px; color:var(--border); }
.lvl-row.done .chk { color:var(--green); }
.lvl-row.milestone { background:rgba(200,160,48,0.06); border-color:rgba(200,160,48,0.15); }
.lvl-row.milestone .note { color:var(--gold); font-weight:600; font-style:normal; }

/* Weapon/spell cards in build */
.equip-section { padding:8px 12px; }
.equip-title { font-family:'Cinzel',serif; font-size:12px; color:var(--gold); margin:10px 0 6px; letter-spacing:1px; }
.equip-card { display:flex; align-items:center; gap:8px; padding:6px 10px; margin:3px 0; background:var(--card); border-radius:5px; border:1px solid var(--border); font-size:11px; }
.equip-card .role { font-size:9px; color:var(--dim); }
.equip-card .ename { color:var(--lt); font-weight:600; flex:1; }

/* Stats summary in build */
.build-summary { padding:10px 12px; background:var(--card); margin:8px 12px; border-radius:6px; border:1px solid var(--border); }
.build-summary .row { display:flex; justify-content:space-between; font-size:11px; padding:2px 0; }
.build-summary .row .k { color:var(--dim); } .build-summary .row .v { color:var(--lt); }

/* Reset button */
.reset-btn { margin:12px; padding:8px; text-align:center; font-size:10px; color:#ef4444; cursor:pointer; border:1px solid #3a1515; border-radius:5px; }
.reset-btn:hover { background:rgba(239,68,68,0.08); }

/* Back button */
.back-btn { padding:10px 16px; font-size:11px; color:var(--dim); cursor:pointer; display:flex; align-items:center; gap:4px; }
.back-btn:hover { color:var(--lt); }

/* Area selector */
.area-select { position:fixed; top:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; height:100vh; background:var(--bg); z-index:100; overflow-y:auto; }

/* Sub-tabs within build */
.build-tabs { display:flex; border-bottom:1px solid var(--border); background:var(--bg2); }
.build-tab { flex:1; padding:8px; text-align:center; font-size:10px; color:var(--dim); cursor:pointer; border-bottom:2px solid transparent; font-family:'Cinzel',serif; }
.build-tab.active { color:var(--gold); border-bottom-color:var(--gold); }

/* Info box */
.info-box { margin:8px 12px; padding:10px; background:rgba(139,92,246,0.06); border:1px solid rgba(139,92,246,0.2); border-radius:6px; font-size:11px; color:var(--lt); line-height:1.5; }
</style>
</head>

function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ck:state.ck, lvl:state.lvl}));
  } catch(e) {}
}

function load() {
  try {
    const d = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    if (d.ck) state.ck = d.ck;
    if (d.lvl) state.lvl = d.lvl;
  } catch(e) {}
}

function toggle(id) { state.ck[id] = !state.ck[id]; save(); render(); }
function toggleLvl(sl) { state.lvl[sl] = !state.lvl[sl]; save(); render(); }

// RENDER
// ═══════════════════════════════════════════════════════════
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else el.setAttribute(k, v);
  });
  children.flat(Infinity).forEach(c => {
    if (c == null) return;
    el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return el;
}

function areaPct(key) {
  const items = A[key].items;
  const done = items.filter(i => state.ck[i[0]]).length;
  return {done, total:items.length, pct:Math.round(done/items.length*100)};
}

function pbar(done, total, color='var(--gold)', ht=6) {
  const outer = h('div',{class:'pbar',style:{height:ht+'px'}});
  const inner = h('div',{class:'fill',style:{width:(total>0?(done/total)*100:0)+'%',background:color}});
  outer.appendChild(inner);
  return outer;
}

// ── Dashboard ──
function renderDash() {
  const allItems = AREA_ORDER.flatMap(a => A[a].items.map(i => i[0]));
  const totalDone = allItems.filter(id => state.ck[id]).length;
  const totalItems = allItems.length;
  const pctAll = Math.round(totalDone/totalItems*100);

  const levsDone = LEVELS.filter(l => state.lvl[l[0]]).length;

  const frag = document.createDocumentFragment();
  frag.appendChild(h('div',{class:'section-title'},`${pctAll}% Complete`));
  frag.appendChild(h('div',{style:{padding:'0 16px 4px'}}, pbar(totalDone, totalItems)));
  frag.appendChild(h('div',{class:'section-sub'},`${totalDone}/${totalItems} items  •  SL ${levsDone > 0 ? LEVELS[Math.min(levsDone,LEVELS.length)-1][0] : 11}/150 build`));

  AREA_ORDER.forEach(ak => {
    const c = areaPct(ak);
    const card = h('div',{class:'area-card',onClick:()=>{state.selArea=ak;state.tab='areas';render();}},
      h('div',{style:{width:'32px'}}, pbar(c.done, c.total, c.pct===100?'var(--green)':'var(--gold)')),
      h('div',{class:'name'}, (c.pct===100?'✅ ':'')+A[ak].name),
      h('div',{class:'pct'}, c.pct+'%')
    );
    frag.appendChild(card);
  });

  frag.appendChild(h('div',{class:'reset-btn',onClick:()=>{if(confirm('Reset ALL progress?')){state.ck={};state.lvl={};save();render();}}},'Reset All Progress'));
  return frag;
}

  frag.appendChild(h('div',{class:'back-btn',onClick:()=>{state.tab='dash';render();}}, '← Dashboard'));

  const sel = h('div',{style:{padding:'0 12px 8px'}});

    h('div',{class:'name',style:{fontFamily:"'Cinzel',serif",color:'var(--gold)'}}, area.name),
    h('div',{class:'pct'}, areaPct(ak).pct+'% ▼')
  );
  sel.appendChild(selBtn);
  frag.appendChild(sel);

  if (state.areaOpen) {
    const list = h('div',{class:'area-select'});
    list.appendChild(h('div',{class:'back-btn',onClick:()=>{state.areaOpen=false;render();}}, '← Back'));
    AREA_ORDER.forEach(a => {
      const ac = areaPct(a);
      const row = h('div',{style:{padding:'8px 16px',cursor:'pointer',display:'flex',justifyContent:'space-between',borderBottom:'1px solid var(--border)',color:a===ak?'var(--gold)':'var(--lt)',fontSize:'12px',background:a===ak?'rgba(200,160,48,0.08)':'transparent'},
        onClick:()=>{state.selArea=a;state.areaOpen=false;render();}},
        h('span',null,(ac.pct===100?'✅ ':'')+A[a].name),
        h('span',{style:{color:'var(--dim)'}},ac.pct+'%')
      );
      list.appendChild(row);
    });
    frag.appendChild(list);
    return frag;
  }

  // Items
  area.items.forEach(([id, text, type]) => {
    const done = state.ck[id];
    const row = h('div',{class:'item-row'+(done?' done':''),onClick:()=>toggle(id)},
      h('div',{class:'check'}, done?'✓':''),
      h('div',{class:'text type-'+type}, text)

    frag.appendChild(row);
  });
  return frag;
}

// ── Quests ──
function renderQuests() {
  const frag = document.createDocumentFragment();
  frag.appendChild(h('div',{class:'section-title'},'NPC Questlines'));
  QUESTS.forEach(q => {
    const card = h('div',{class:'quest-card'});
    card.appendChild(h('div',{class:'quest-name'},q.name));
    q.steps.forEach(sid => {
      const done = state.ck[sid];
      // Find the item text
      let txt = sid;
      for (const ak of AREA_ORDER) {
        const item = A[ak].items.find(i => i[0]===sid);
        if (item) { txt = item[1]; break; }
      }
      card.appendChild(h('div',{class:'quest-step'+(done?' done':''),onClick:()=>toggle(sid)},
        h('div',{class:'check',style:{width:'16px',height:'16px',border:'2px solid var(--border)',borderRadius:'3px',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'10px',color:done?'var(--green)':'transparent',borderColor:done?'var(--green)':'var(--border)'}}, done?'✓':''),
        h('div',{style:{fontSize:'11px'}}, txt)
      ));
    });
    if (q.bosses.length > 0) {
      card.appendChild(h('div',{style:{fontSize:'10px',color:'var(--ember)',marginTop:'6px',marginBottom:'2px'}},'Boss Survivals:'));
      q.bosses.forEach(bid => {
        const done = state.ck[bid];
        let txt = bid;
        for (const ak of AREA_ORDER) {
          const item = A[ak].items.find(i => i[0]===bid);
          if (item) { txt = item[1]; break; }
        }
        card.appendChild(h('div',{class:'boss-tag',style:{cursor:'pointer',opacity:done?0.4:1},onClick:()=>toggle(bid)}, (done?'✓ ':'')+txt));
      });
    }
    card.appendChild(h('div',{style:{fontSize:'10px',color:'var(--dim)',marginTop:'6px',fontStyle:'italic'}},q.reward));
    frag.appendChild(card);
  });
  return frag;
}

  const frag = document.createDocumentFragment();
  const cur = getCurrentStats();
  const levsDone = LEVELS.filter(l => state.lvl[l[0]]).length;

  hdr.appendChild(h('div',{style:{fontSize:'10px',color:'var(--dim)',marginTop:'4px'}}, levsDone+'/'+LEVELS.length+' levels'));

  // Current stats bar
  const targets = {VGR:25,END:20,VIT:8,ATN:43,STR:14,DEX:20,ADP:13,INT:30,FTH:30};
  const sbar = h('div',{class:'stat-bar'});
  Object.entries(cur).forEach(([k,v]) => {
    const done = v >= targets[k];
    const chip = h('div',{class:'stat-chip'+(done?' done':'')},
      h('span',{style:{color:STAT_COLORS[k]}},k.slice(0,3)+' '),
      h('span',{class:'val'},v+'/'+targets[k])
    );
    sbar.appendChild(chip);
  });

  // Build sub-tabs
  const btabs = h('div',{class:'build-tabs'});

  if (state.buildSub === 'roadmap') frag.appendChild(renderRoadmap());

  return frag;

  // Level rows
  const grid = h('div',{class:'level-grid'});
  const filtered = state.buildPhase === 0 ? LEVELS : LEVELS.filter(l => l[3] === state.buildPhase);
  let lastPhase = 0;

  filtered.forEach(([sl, stat, val, phase, note]) => {
    if (phase !== lastPhase) {
      const pi = PHASE_INFO[phase-1];
      grid.appendChild(h('div',{class:'phase-header'},
        h('div',{class:'dot',style:{background:pi.color}}),
        h('div',{class:'label'},'Phase '+pi.num+': '+pi.name),
        h('div',{class:'range'},pi.range)
      ));
      lastPhase = phase;
    }

    const done = state.lvl[sl];
    const isMilestone = note && note.startsWith('★');
    const pi = PHASE_INFO[phase-1];

    const row = h('div',{class:'lvl-row'+(done?' done':'')+(isMilestone?' milestone':''),onClick:()=>toggleLvl(sl)},
      h('div',{class:'sl'},'SL'+sl),
      h('div',{class:'phase-dot',style:{background:pi.color}}),
      h('div',{class:'stat-name',style:{color:STAT_COLORS[stat]}},stat),
      h('div',{class:'arrow'},'→'),
      h('div',{class:'new-val',style:{color:STAT_COLORS[stat]}},String(val)),
      h('div',{class:'note'},note||''),
      h('div',{class:'chk'},done?'✓':'·')
    );
    grid.appendChild(row);
  });

  // Quick-fill buttons
  const qf = h('div',{style:{display:'flex',gap:'6px',padding:'10px 8px',flexWrap:'wrap'}});
  PHASE_INFO.forEach(pi => {
    const pLevels = LEVELS.filter(l=>l[3]===pi.num);
    const pDone = pLevels.filter(l=>state.lvl[l[0]]).length;
    if (pDone < pLevels.length) {
      qf.appendChild(h('div',{style:{padding:'4px 10px',fontSize:'9px',background:'var(--card)',border:'1px solid var(--border)',borderRadius:'4px',cursor:'pointer',color:pi.color,fontFamily:"'Cinzel',serif"},
        onClick:()=>{pLevels.forEach(l=>state.lvl[l[0]]=true);save();render();}},
        'Fill P'+pi.num
      ));
    }
  });
  qf.appendChild(h('div',{style:{padding:'4px 10px',fontSize:'9px',background:'var(--card)',border:'1px solid #3a1515',borderRadius:'4px',cursor:'pointer',color:'#ef4444',fontFamily:"'Cinzel',serif"},
    onClick:()=>{state.lvl={};save();render();}},
    'Reset All'
  ));
  grid.appendChild(qf);

  frag.appendChild(grid);
  return frag;
}

// ═══════════════════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════════════════
function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  // Header
  const hdr = h('div',{class:'header'});
  hdr.appendChild(h('h1',null,'DS2 SotFS'));
  hdr.appendChild(h('div',{class:'sub'},'100% Progression Engine — Dark Hexer Build'));
  app.appendChild(hdr);

  // Tabs
  const tabs = h('div',{class:'tabs'});
  [['dash','Dashboard'],['areas','Areas'],['quests','Quests'],['trackers','Trackers'],['build','Build']].forEach(([id,label]) => {
    tabs.appendChild(h('div',{class:'tab'+(state.tab===id?' active':''),onClick:()=>{state.tab=id;render();}},label));
  });
  app.appendChild(tabs);

  // Content
  const content = h('div',{class:'content'});
  switch(state.tab) {
    case 'dash': content.appendChild(renderDash()); break;
    case 'areas': content.appendChild(renderArea()); break;
    case 'quests': content.appendChild(renderQuests()); break;
    case 'trackers': content.appendChild(renderTrackers()); break;
    case 'build': content.appendChild(renderBuild()); break;
  }
  app.appendChild(content);
}

// Init
load();
render();
</script>
